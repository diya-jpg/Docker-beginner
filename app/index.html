<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>

    <style>

        body{
            font-family: Arial;
            margin-left:100px;
        }

        input{
            width:300px;
            height:30px;
        }

        button{
            padding:12px 30px;
            border-radius:10px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<h1>User Profile</h1>

<p>
    Name :
    <input type="text" id="name">
</p>

<hr>

<p>
    Email :
    <input type="text" id="email">
</p>

<hr>

<p>
    Interests :
    <input type="text" id="interests">
</p>

<hr>

<button onclick="updateProfile()">
    Edit Profile
</button>

<script>

// Load Profile
fetch('/get-profile')
.then(response => response.json())
.then(data => {

    document.getElementById('name').value =
        data.name;

    document.getElementById('email').value =
        data.email;

    document.getElementById('interests').value =
        data.interests;

});

// Update Profile
function updateProfile(){

    fetch('/update-profile',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            name:
            document.getElementById('name').value,

            email:
            document.getElementById('email').value,

            interests:
            document.getElementById('interests').value

        })

    })
    .then(response=>response.text())
    .then(data=>{

        alert(data);

    });

}

</script>

</body>
</html>
